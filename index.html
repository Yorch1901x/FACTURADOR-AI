<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Facturador AI — Gestión Empresarial Inteligente</title>
    <meta name="description" content="Facturador AI: la solución inteligente para facturación, inventario y reportes empresariales en un solo lugar." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'ui-sans-serif', 'system-ui'],
            },
            colors: {
              primary: '#111827',
              secondary: '#6b7280',
            },
            animation: {
              'fade-in': 'fadeIn 0.6s ease-out forwards',
              'slide-up': 'slideUp 0.7s ease-out forwards',
              'float': 'float 6s ease-in-out infinite',
              'shimmer': 'shimmer 2.5s linear infinite',
              'glow': 'glow 2s ease-in-out infinite alternate',
              'spin-slow': 'spin 8s linear infinite',
              'bounce-slow': 'bounce 3s infinite',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              slideUp: {
                '0%': { opacity: '0', transform: 'translateY(30px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              float: {
                '0%, 100%': { transform: 'translateY(0px)' },
                '50%': { transform: 'translateY(-20px)' },
              },
              shimmer: {
                '0%': { backgroundPosition: '-200% 0' },
                '100%': { backgroundPosition: '200% 0' },
              },
              glow: {
                '0%': { boxShadow: '0 0 20px rgba(255,255,255,0.1)' },
                '100%': { boxShadow: '0 0 50px rgba(255,255,255,0.3)' },
              },
            },
          }
        }
      }
    </script>
    <style>
      * { font-family: 'Inter', sans-serif; }

      /* Global animations */
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes slideInLeft { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: translateX(0); } }
      @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-18px); } }
      @keyframes floatAlt { 0%,100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-12px) rotate(5deg); } }
      @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
      @keyframes glow { 0% { box-shadow: 0 0 20px rgba(255,255,255,0.1); } 100% { box-shadow: 0 0 50px rgba(255,255,255,0.3), 0 0 100px rgba(255,255,255,0.1); } }
      @keyframes gradientShift { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
      @keyframes particleDrift { 0% { transform: translateY(0) translateX(0) scale(1); opacity: 0.4; } 50% { opacity: 0.8; } 100% { transform: translateY(-100px) translateX(30px) scale(0.5); opacity: 0; } }
      @keyframes orb { 0%,100% { transform: translate(0,0) scale(1); } 33% { transform: translate(40px,-30px) scale(1.1); } 66% { transform: translate(-20px,20px) scale(0.95); } }
      @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      @keyframes pulseSoft { 0%,100% { opacity:0.6; transform:scale(1); } 50% { opacity:1; transform:scale(1.05); } }

      .animate-fade-in { animation: fadeIn 0.6s ease-out forwards; }
      .animate-slide-up { animation: slideUp 0.7s ease-out forwards; }
      .animate-slide-up-delay-1 { animation: slideUp 0.7s 0.15s ease-out both; }
      .animate-slide-up-delay-2 { animation: slideUp 0.7s 0.3s ease-out both; }
      .animate-slide-up-delay-3 { animation: slideUp 0.7s 0.45s ease-out both; }
      .animate-slide-in-left { animation: slideInLeft 0.6s ease-out forwards; }
      .animate-float { animation: float 6s ease-in-out infinite; }
      .animate-float-alt { animation: floatAlt 7s ease-in-out infinite; }
      .animate-float-slow { animation: float 9s ease-in-out infinite; }
      .animate-shimmer { background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.12) 50%, transparent 100%); background-size: 200% 100%; animation: shimmer 2.5s linear infinite; }
      .animate-glow { animation: glow 2s ease-in-out infinite alternate; }
      .animate-gradient { background-size: 300% 300%; animation: gradientShift 8s ease infinite; }
      .animate-orb { animation: orb 12s ease-in-out infinite; }
      .animate-orb-alt { animation: orb 15s ease-in-out infinite reverse; }
      .animate-spin-slow { animation: spin-slow 12s linear infinite; }
      .animate-pulse-soft { animation: pulseSoft 3s ease-in-out infinite; }

      /* Glassmorphism */
      .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.15); }
      .glass-dark { background: rgba(0,0,0,0.25); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
      .glass-white { background: rgba(255,255,255,0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.6); }

      /* Gradient text — grayscale */
      .gradient-text { background: linear-gradient(135deg, #fff 0%, #d1d5db 50%, #9ca3af 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
      .gradient-text-dark { background: linear-gradient(135deg, #111827 0%, #374151 50%, #6b7280 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

      /* Card hover lift */
      .card-hover { transition: transform 0.3s ease, box-shadow 0.3s ease; }
      .card-hover:hover { transform: translateY(-6px); box-shadow: 0 20px 60px rgba(0,0,0,0.15); }

      /* Button shimmer effect */
      .btn-shimmer { position: relative; overflow: hidden; }
      .btn-shimmer::after { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent); transition: left 0.5s ease; }
      .btn-shimmer:hover::after { left: 100%; }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.25); border-radius: 3px; }

      @media print {
        body * { visibility: hidden; }
        #printable-area, #printable-area * { visibility: visible; }
        #printable-area { position: absolute; left: 0; top: 0; width: 100%; background: white; z-index: 9999; }
        .no-print { display: none !important; }
        @page { margin: 0.5cm; size: auto; }
      }
    </style>

</head>
  <body class="bg-gray-50 text-gray-900 font-sans antialiased">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
